name: crypto-radar

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    profiles: ["app"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_FASTAPI_HTTP_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_FASTAPI_WS_URL: ws://127.0.0.1:8000/api/v1/realtime/ws
      NEXT_PUBLIC_FASTAPI_SSE_URL: http://127.0.0.1:8000/api/v1/realtime/events
      NEXT_PUBLIC_FASTAPI_TIMEOUT_MS: ${NEXT_PUBLIC_FASTAPI_TIMEOUT_MS:-8000}
      OTEL_SERVICE_NAME: crypto-radar-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql://crypto_radar:crypto_radar@postgres:5432/crypto_radar
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: crypto_radar
      CLICKHOUSE_USER: crypto_radar
      CLICKHOUSE_PASSWORD: crypto_radar
      OTEL_SERVICE_NAME: crypto-radar-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      CRYPTO_RADAR_SCANNER_ENABLED: ${CRYPTO_RADAR_SCANNER_ENABLED:-false}
      MAX_SCANNER_PAIRS: ${MAX_SCANNER_PAIRS:-20}
      TRUNCATE_SCANNER_PAIRS_OVER_LIMIT: ${TRUNCATE_SCANNER_PAIRS_OVER_LIMIT:-false}
      SCANNER_WARMUP_CONCURRENCY: ${SCANNER_WARMUP_CONCURRENCY:-2}
      SCANNER_WARMUP_TIMEOUT_SECONDS: ${SCANNER_WARMUP_TIMEOUT_SECONDS:-8}
      EXCHANGE_INSTRUMENT_SYNC_ENABLED: ${EXCHANGE_INSTRUMENT_SYNC_ENABLED:-false}
      DERIVATIVE_SNAPSHOT_SYNC_ENABLED: ${DERIVATIVE_SNAPSHOT_SYNC_ENABLED:-false}
      ORDERBOOK_SNAPSHOT_SYNC_ENABLED: ${ORDERBOOK_SNAPSHOT_SYNC_ENABLED:-false}
      REAL_POSITION_SYNC_ENABLED: ${REAL_POSITION_SYNC_ENABLED:-false}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
      ENABLE_BYBIT_LIVE_ORDER_PLACEMENT: ${ENABLE_BYBIT_LIVE_ORDER_PLACEMENT:-false}
      ENABLE_BYBIT_MAINNET_ORDER_PLACEMENT: ${ENABLE_BYBIT_MAINNET_ORDER_PLACEMENT:-false}
      REQUIRE_PROTECTIVE_STOP_FOR_LIVE_ENTRY: ${REQUIRE_PROTECTIVE_STOP_FOR_LIVE_ENTRY:-true}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_SECRET: ${BYBIT_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend-dev:
    image: node:24.16.0-slim
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_FASTAPI_HTTP_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_FASTAPI_WS_URL: ws://127.0.0.1:8000/api/v1/realtime/ws
      NEXT_PUBLIC_FASTAPI_SSE_URL: http://127.0.0.1:8000/api/v1/realtime/events
      NEXT_PUBLIC_FASTAPI_TIMEOUT_MS: ${NEXT_PUBLIC_FASTAPI_TIMEOUT_MS:-8000}
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

  backend-dev:
    image: python:3.12-slim
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "python -m pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://crypto_radar:crypto_radar@postgres:5432/crypto_radar
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: crypto_radar
      CLICKHOUSE_USER: crypto_radar
      CLICKHOUSE_PASSWORD: crypto_radar
      OTEL_SERVICE_NAME: crypto-radar-backend-dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      CRYPTO_RADAR_SCANNER_ENABLED: ${CRYPTO_RADAR_SCANNER_ENABLED:-false}
      MAX_SCANNER_PAIRS: ${MAX_SCANNER_PAIRS:-20}
      TRUNCATE_SCANNER_PAIRS_OVER_LIMIT: ${TRUNCATE_SCANNER_PAIRS_OVER_LIMIT:-false}
      SCANNER_WARMUP_CONCURRENCY: ${SCANNER_WARMUP_CONCURRENCY:-2}
      SCANNER_WARMUP_TIMEOUT_SECONDS: ${SCANNER_WARMUP_TIMEOUT_SECONDS:-8}
      EXCHANGE_INSTRUMENT_SYNC_ENABLED: ${EXCHANGE_INSTRUMENT_SYNC_ENABLED:-false}
      DERIVATIVE_SNAPSHOT_SYNC_ENABLED: ${DERIVATIVE_SNAPSHOT_SYNC_ENABLED:-false}
      ORDERBOOK_SNAPSHOT_SYNC_ENABLED: ${ORDERBOOK_SNAPSHOT_SYNC_ENABLED:-false}
      REAL_POSITION_SYNC_ENABLED: ${REAL_POSITION_SYNC_ENABLED:-false}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
      ENABLE_BYBIT_LIVE_ORDER_PLACEMENT: ${ENABLE_BYBIT_LIVE_ORDER_PLACEMENT:-false}
      ENABLE_BYBIT_MAINNET_ORDER_PLACEMENT: ${ENABLE_BYBIT_MAINNET_ORDER_PLACEMENT:-false}
      REQUIRE_PROTECTIVE_STOP_FOR_LIVE_ENTRY: ${REQUIRE_PROTECTIVE_STOP_FOR_LIVE_ENTRY:-true}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_SECRET: ${BYBIT_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    profiles: ["app", "dev", "infra"]
    environment:
      POSTGRES_DB: crypto_radar
      POSTGRES_USER: crypto_radar
      POSTGRES_PASSWORD: crypto_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_radar -d crypto_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["app", "dev", "infra"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    profiles: ["app", "dev", "infra"]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    profiles: ["app", "dev", "infra"]
    environment:
      CLICKHOUSE_DB: crypto_radar
      CLICKHOUSE_USER: crypto_radar
      CLICKHOUSE_PASSWORD: crypto_radar
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' --user crypto_radar --password crypto_radar"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["observability", "infra"]
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability", "infra"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability", "infra"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  loki:
    image: grafana/loki:3
    profiles: ["observability", "infra"]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  nats_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
  loki_data:
